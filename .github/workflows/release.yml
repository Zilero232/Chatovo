name: Release Desktop App

# Builds the Tauri desktop app for Windows, macOS and Linux and publishes the
# artifacts to a GitHub Release. The Tauri updater (configured in
# apps/tauri/tauri.conf.json) reads `latest.json` from the same release, so
# users get auto-updates once the release goes live.
#
# Trigger: automatically on push to master when `apps/tauri/package.json` changes,
# or manually via "Run workflow" in the GitHub Actions UI. The version is read
# from `apps/tauri/package.json#version` and the release is tagged `app-vX.Y.Z`.
# If a release with that tag already exists, the build is skipped (idempotent —
# safe to re-run on merges that don't actually bump the version).
#
# Required GitHub repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY  Minisign private key (matches `plugins.updater.pubkey`
#                              already committed in tauri.conf.json).
#                              Generate once with: bun run signer:generate (in apps/tauri).
#                              Key is created without a password — see apps/tauri/package.json.
#
# NEXT_PUBLIC_* values that get baked into the static Next.js export consumed
# by Tauri are read from the same secrets used by the web deploy workflow.
#
# Optional (not configured yet, leave unset → unsigned macOS build with warning):
#   APPLE_CERTIFICATE                   Base64 of the .p12 codesigning certificate
#   APPLE_CERTIFICATE_PASSWORD          .p12 password
#   APPLE_SIGNING_IDENTITY              e.g. "Developer ID Application: Name (TEAMID)"
#   APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID   for notarization

on:
  push:
    branches: [master]
    paths:
      - 'apps/tauri/package.json'
  workflow_dispatch: {}

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.read.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4

      # `jq -r` extracts the raw value; passes 0.1.0 (without quotes) to the next jobs.
      - name: Read version from apps/tauri/package.json
        id: read
        run: echo "version=$(jq -r .version apps/tauri/package.json)" >> "$GITHUB_OUTPUT"

      # Skip the build if a release with this tag already exists. Keeps the
      # push trigger idempotent — merges that touch package.json without
      # bumping the version won't double-release.
      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="app-v${{ steps.read.outputs.version }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $tag already exists — skipping build."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release $tag does not exist — proceeding."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-version
    if: needs.resolve-version.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal binary on macOS needs both targets; harmless on other OS.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo registry & target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri -> target

      # Tauri on Ubuntu needs the WebKit / GTK system libs.
      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # Skip postinstall (which runs `prisma generate` and reads DIRECT_URL)
      # because CI lacks DIRECT_URL.
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      # Tauri ships the client's static export. The client's tsc step type-checks
      # apps/server (transitive types), which imports the generated Prisma client.
      # Generate it explicitly — `prisma generate` doesn't connect to the DB, but
      # prisma.config.ts resolves `env('DIRECT_URL')` at load time and crashes if
      # unset, so we pass a dummy value just to satisfy the resolver.
      - name: Generate Prisma client
        working-directory: apps/server
        env:
          DIRECT_URL: 'postgresql://ci:ci@localhost:5432/ci'
        run: bunx prisma generate

      - name: Build & release desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # NEXT_PUBLIC_* are baked into the static export that Tauri ships.
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_LIVEKIT_URL: ${{ secrets.NEXT_PUBLIC_LIVEKIT_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          # macOS code signing & notarization (optional — skipped if unset).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/tauri
          tagName: app-v${{ needs.resolve-version.outputs.version }}
          releaseName: 'Chatovo v${{ needs.resolve-version.outputs.version }}'
          releaseBody: |
            Desktop builds of Chatovo v${{ needs.resolve-version.outputs.version }}.

            - Windows: `.msi` installer
            - macOS: `.dmg` (universal: Apple Silicon + Intel)
            - Linux: `.deb` and `.AppImage`

            The app auto-updates on launch via the built-in Tauri updater.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
