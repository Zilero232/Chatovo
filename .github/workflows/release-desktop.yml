name: Release Desktop

# Tauri desktop builds (Windows, macOS, Linux) → GitHub Release `desktop-vX.Y.Z`.
# Tauri updater reads latest.json from the latest non-prerelease release — keep
# desktop as the only non-prerelease channel (mobile/web use prerelease).
#
# Secrets: TAURI_SIGNING_PRIVATE_KEY, NEXT_PUBLIC_API_URL, NEXT_PUBLIC_LIVEKIT_URL

on:
  push:
    branches: [master]
    paths:
      - 'package.json'
  workflow_dispatch: {}

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.read.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5

      - name: Read version from root package.json
        id: read
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if desktop release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="desktop-v${{ steps.read.outputs.version }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve-version
    if: needs.resolve-version.outputs.should_release == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Sync Tauri version from root package.json
        shell: bash
        working-directory: apps/tauri
        run: |
          version="${{ needs.resolve-version.outputs.version }}"
          jq --arg v "$version" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          jq --arg v "$version" '.version = $v' tauri.conf.json > tauri.conf.json.tmp && mv tauri.conf.json.tmp tauri.conf.json
          sed -i.bak -E '/^\[package\]/,/^\[/ s/^version = "[^"]*"/version = "'"$version"'"/' Cargo.toml && rm Cargo.toml.bak
          sed -i.bak -E '/^name = "chatovo"$/{n;s/^version = "[^"]*"/version = "'"$version"'"/;}' Cargo.lock && rm Cargo.lock.bak

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo registry & target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri -> target

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        working-directory: apps/server
        env:
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
        run: bunx prisma generate

      - name: Build & release desktop app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_LIVEKIT_URL: ${{ secrets.NEXT_PUBLIC_LIVEKIT_URL }}
        with:
          projectPath: apps/tauri
          tagName: desktop-v${{ needs.resolve-version.outputs.version }}
          releaseName: 'Chatovo Desktop v${{ needs.resolve-version.outputs.version }}'
          releaseBody: |
            Desktop builds of Chatovo v${{ needs.resolve-version.outputs.version }}.

            - Windows: `.msi`
            - macOS: `.dmg` (Apple Silicon + Intel)
            - Linux: `.deb` and `.AppImage`

            Auto-update on launch via the built-in Tauri updater.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
