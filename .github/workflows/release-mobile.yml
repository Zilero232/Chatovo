name: Release Mobile

# Android APK builds → GitHub Release `mobile-vX.Y.Z` (prerelease).
# Play Store / signed AAB is a separate process (docs/play-store/).
#
# Secrets: NEXT_PUBLIC_API_URL, NEXT_PUBLIC_LIVEKIT_URL

on:
  push:
    branches: [master]
    paths:
      - 'package.json'
  workflow_dispatch: {}

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.read.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v5

      - name: Read version from root package.json
        id: read
        run: echo "version=$(jq -r .version package.json)" >> "$GITHUB_OUTPUT"

      - name: Check if mobile release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="mobile-v${{ steps.read.outputs.version }}"
          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build-mobile:
    needs: resolve-version
    if: needs.resolve-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Sync Tauri version from root package.json
        shell: bash
        working-directory: apps/tauri
        run: |
          version="${{ needs.resolve-version.outputs.version }}"
          jq --arg v "$version" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          jq --arg v "$version" '.version = $v' tauri.conf.json > tauri.conf.json.tmp && mv tauri.conf.json.tmp tauri.conf.json
          sed -i.bak -E '/^\[package\]/,/^\[/ s/^version = "[^"]*"/version = "'"$version"'"/' Cargo.toml && rm Cargo.toml.bak
          sed -i.bak -E '/^name = "chatovo"$/{n;s/^version = "[^"]*"/version = "'"$version"'"/;}' Cargo.lock && rm Cargo.lock.bak

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          link-to-sdk: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo registry & target
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/tauri -> target

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Generate Prisma client
        working-directory: apps/server
        env:
          DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
        run: bunx prisma generate

      - name: Build client static export
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_LIVEKIT_URL: ${{ secrets.NEXT_PUBLIC_LIVEKIT_URL }}
        run: bun --filter @chatovo/client build

      - name: Init Android project
        working-directory: apps/tauri
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: bunx tauri android init

      - name: Build Android APKs
        working-directory: apps/tauri
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: bunx tauri android build

      - name: Collect APK artifacts
        run: |
          mkdir -p android-artifacts
          find apps/tauri/gen/android -name '*.apk' -exec cp {} android-artifacts/ \;
          if [ -z "$(ls -A android-artifacts)" ]; then
            echo "No APK files found"
            exit 1
          fi

      - name: Publish draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: mobile-v${{ needs.resolve-version.outputs.version }}
          name: Chatovo Mobile v${{ needs.resolve-version.outputs.version }}
          draft: true
          prerelease: true
          body: |
            Android builds of Chatovo v${{ needs.resolve-version.outputs.version }}.

            `.apk` files for manual install and testing.
          files: android-artifacts/*
